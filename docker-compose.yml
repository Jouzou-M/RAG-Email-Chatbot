services:
  api:
    build: .
    command: uvicorn email_rag.api.app:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./credentials.json:/app/credentials.json:ro
    env_file:
      - .env
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run src/email_rag/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
